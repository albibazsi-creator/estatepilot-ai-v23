name: V20 Artifact QA

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  artifact-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run no-dependency V20 checks
        run: npm run release:v20-check
